<header class="border-b border-slate-200 bg-white shadow-[0_10px_30px_rgba(15,23,42,0.08)]">
  <div class="mx-auto flex w-full max-w-6xl flex-col gap-4 px-4 py-5 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
    <div class="min-w-0">
      <p class="text-xs font-semibold uppercase tracking-[0.28em] text-sky-600">Layout Toolbar</p>
      <h1 class="mt-2 text-2xl font-bold text-slate-900 sm:text-3xl">{{ title() }}</h1>
      @if (subtitle()) {
        <p class="mt-2 max-w-2xl text-sm text-slate-600 sm:text-base">{{ subtitle() }}</p>
      }
    </div>

    <div class="flex flex-wrap items-center gap-3" data-testid="toolbar-actions">
      <ng-content select="[toolbar-actions]"></ng-content>
    </div>
  </div>
</header>
