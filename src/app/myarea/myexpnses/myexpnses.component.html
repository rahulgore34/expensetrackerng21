<section class="min-h-screen bg-slate-100 px-4 py-8">

  <div class="flex min-h-screen items-center justify-center">
    <form
      [formGroup]="expenseForm"
      (ngSubmit)="onSubmit()"
      class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-8 shadow-xl"
    >
      <div class="mb-8 text-center">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Welcome, {{ loggedInEmail }} | My Expenses</p>
        <h1 class="mt-3 text-3xl font-bold text-slate-800">Add Expense</h1>
        @if(showSuccessMessage()) {
          <p class="text-green-500">Expense Saved Successfully!
            <span style="display: inline-block;cursor: pointer;margin-left: 16px;" (click)="closeSuccessMsg()">X</span>
          </p>
        }
      </div>

      <div class="space-y-5">
        <div>
          <label for="expenseName" class="mb-2 block text-sm font-medium text-slate-700">Expense Name</label>
          <input
            id="expenseName"
            type="text"
            formControlName="expenseName"
            placeholder="Enter expense name"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-800 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />
        </div>

        <div>
          <label for="expenseAmount" class="mb-2 block text-sm font-medium text-slate-700">Expense Amount</label>
          <input
            id="expenseAmount"
            type="number"
            formControlName="expenseAmount"
            placeholder="Enter expense amount"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-800 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />
        </div>

        <div>
          <label for="paidFrom" class="mb-2 block text-sm font-medium text-slate-700">Paid From</label>
          <select
            id="paidFrom"
            formControlName="paidFrom"
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-800 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          >
            @for (option of paidFromOptions; track option) {
              <option [value]="option">{{ option }}</option>
            }
          </select>
        </div>

        <div>
          <label for="expenseDate" class="mb-2 block text-sm font-medium text-slate-700">Expense Date</label>
          <input
            id="expenseDate"
            type="date"
            formControlName="expenseDate"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-800 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />
        </div>

        <button
          type="submit"
          class="w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-300"
        >
          Submit Expense
        </button>
      </div>
    </form>
  </div>
</section>
